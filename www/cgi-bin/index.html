<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGI-BIN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@200;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.5);
      --accent: #4fc3f7;
      --accent-glow: rgba(79, 195, 247, 0.35);
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Exo 2', sans-serif;
      background: #080c10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
 
    /* Ambient background layers */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79, 195, 247, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(103, 58, 183, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 10% 80%, rgba(0, 188, 212, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
 
    /* Subtle grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 195, 247, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 195, 247, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
 
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
    }
 
    /* Title */
    .title-wrap {
      text-align: center;
      animation: fadeDown 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
 
    .title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 5.5rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e8f4fd;
      text-shadow:
        0 0 40px rgba(79, 195, 247, 0.5),
        0 0 80px rgba(79, 195, 247, 0.2),
        0 2px 4px rgba(0,0,0,0.8);
      position: relative;
    }
 
    .title::after {
      content: 'CGI-BIN';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(79, 195, 247, 0.15) 0%, transparent 60%);
      -webkit-background-clip: text;
      background-clip: text;
      pointer-events: none;
    }
 
    .subtitle {
      margin-top: 0.6rem;
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(79, 195, 247, 0.55);
    }
 
    /* Buttons row */
    .btn-row {
      display: flex;
      flex-direction: row;
      gap: 3rem;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
 
    /* iPhone-style glass button */
    .glass-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      text-decoration: none;
      padding: 0.4rem 2rem;
      min-width: 140px;
 
      background: rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 -1px 0 rgba(0, 0, 0, 0.3) inset;
 
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
 
      cursor: pointer;
      overflow: hidden;
    }
 
    /* Top sheen like iPhone glass */
    .glass-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
      border-radius: 20px 20px 0 0;
      pointer-events: none;
    }
 
    /* Glow bleed on hover */
    .glass-btn::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: transparent;
      transition: box-shadow 0.22s ease;
      pointer-events: none;
    }
 
    .glass-btn:hover {
      transform: translateY(-4px) scale(1.03);
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(79, 195, 247, 0.35);
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.55),
        0 0 24px rgba(79, 195, 247, 0.2),
        0 1px 0 rgba(255, 255, 255, 0.12) inset;
    }
 
    .glass-btn:active {
      transform: translateY(-1px) scale(0.98);
      box-shadow:
        0 6px 20px rgba(0, 0, 0, 0.5),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }
 
    .btn-icon {
      font-size: 1.9rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(79, 195, 247, 0.4));
    }
 
    .btn-label {
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232, 244, 253, 0.85);
    }
 
    .btn-path {
      font-family: 'Exo 2', sans-serif;
      font-weight: 200;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: rgba(79, 195, 247, 0.5);
    }

    .Last {
      display: flex;
      min-width: 50%;
      width: fit-content;
      min-height: fit-content;
      height: auto;
      flex-direction: column;
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.50);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0),
        0 1px 0 rgba(255, 255, 255, 0) inset,
        0 -1px 0 rgba(0, 0, 0, 0) inset;
    }

    .Output {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      position: center;
      color: #e8f4fd;
      text-shadow:
        0 0 12px rgba(79, 195, 247, 0.5),
        0 0 24px rgba(79, 195, 247, 0.2);
      padding-left: 1.2rem;
    }

    .Output-detail {
      margin-top: 0.5rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: 0.9rem;
      position: center;
      color: rgba(79, 195, 247, 0.7);
      list-style: none;
      padding-left: 1.2rem;
    }
 
    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* Responsive: stack on very small screens */
    @media (max-width: 480px) {
      .btn-row {
        flex-direction: column;
        align-items: center;
      }
      .glass-btn {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Title -->
    <div class="title-wrap">
      <h1 class="title">CGI-BIN</h1>
      <p class="subtitle">Here you can try all the executable scripts we made</p>
    </div>
    <!-- Buttons -->
    <div class="btn-row">
      <button class="glass-btn" onclick="runCGI('/cgi-bin/roast_me.py')">
        <span class="btn-icon">🔥</span>
        <span class="btn-label">Roast Me</span>
      </button>
 
      <button class="glass-btn" onclick="runCGI('/cgi-bin/inspire_me.py')">
        <span class="btn-icon">💡</span>
        <span class="btn-label">Inspire Me</span>
      </button>
 
      <button class="glass-btn" onclick="runCGI('/cgi-bin/surprise_me.py')">
        <span class="btn-icon">🎁</span>
        <span class="btn-label">Surprise Me</span>
      </button>
      
      <a href="/../index.html" class="glass-btn">
        <span class="btn-icon">🏠</span>
        <span class="btn-label">Back Home</span>
      </a>

    </div>

    <div class="Last">
		  <p class="Output">Message: </p>
		  <ul class="Output-detail loading" id="output">
			  <li>—</li>
		</ul>
	  </div>
  </div>
  <script>
    function runCGI(script) {
      const el = document.getElementById("output");
      el.classList.add("loading");
      el.innerHTML = "<li>—</li>";
 
      fetch(script)
        .then(res => res.text())
        .then(output => {
          el.classList.remove("loading");
          el.innerHTML = `<li>${output.trim()}</li>`;
        })
        .catch(() => {
          el.classList.remove("loading");
          el.innerHTML = `<li>Failed to reach ${script}</li>`;
        });
    }
  </script>
</body>
</html>
