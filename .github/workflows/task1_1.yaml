name: T1.1 - Scaffolding & epoll Skeleton

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]\.[0-9]*"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=1
          TASK=1

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -eq "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_1-1_Testing:
    name: Task 1.1 testing
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ strace netcat-openbsd

      - uses: actions/checkout@v4

      #────── BUILD
      - name: Compile with strict flags
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      #──── MAKEFILE

      - name: make all
        run: make all

      - name: make clean - removes object
        run: |
          make clean
          find . -name "*.o" | grep -q . && echo "FAIL: .o files remain" && exit 1
          echo "PASS: no .o files after clean"

      - name: make fclean - removes binary
        run: |
          make fclean
          test ! -f ./webserv && echo "PASS: binary removed!"

      - name: make re - full rebuild
        run: |
          make re
          OUTPUT=$(make 2>&1)
          echo "$OUTPUT" | grep -q "Nothing to be done for" && echo "PASS: no relink" || (echo "FAIL: relinking" && exit 1)

      # ── C++98 Compliance ──
      - name: Check for auto keyword
        run: |
          grep -rn "\bauto\b" src/ includes/ && echo "FAIL: 'auto' found" && exit 1
          echo "PASS: no auto"

      - name: Check for nullptr
        run: |
          grep -rn "\bnullptr\b" src/ includes/ && echo "FAIL: 'nullptr' found" && exit 1
          echo "PASS: no nullptr"

      - name: Compile explicitly with -std=c++98
        run: make fclean && make CXXFLAGS="-Wall -Wextra -Werror -std=c++98"

      # ── ePoll Accepts Connections
      - name: Rebuild before server tests
        run: make re

      - name: Start server in background
        run: |
          ./webserv config/default.conf &
          echo $! > /tmp/webserv.pid
          sleep 1

      - name: Test connection is accepted
        run: |
          curl --max-time 3 --connect-timeout 2 -s http://localhost:8080/ || true
          nc -zv 127.0.0.1 8080 && echo "PASS: port 8080 is open"

      - name: Verify no crashes after connection
        run: |
          PID=$(cat /tmp/webserv.pid)
          sleep 1
          kill -0 $PID && echo "PASS: server still running"

      - name: Teardown
        if: always()
        run: |
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill $PID 2>/dev/null || true

      # ── Epoll Single Instance ──

      - name: Count epoll_wait calls with strace
        run: |
          ./webserv config/default.conf &
          PID=$!
          sleep 0.5

          timeout 2 strace -p $PID -e trace=epoll_wait 2>&1 | tee /tmp/strace.out || true

          kill $PID 2>/dev/null || true

          COUNT=$(grep -c "epoll_wait" /tmp/strace.out || true)
          COUNT=${COUNT:-0}
          echo "epoll_wait calls observed: $COUNT"
          test "$COUNT" -ge 1 && echo "PASS: epoll_wait is being called"
