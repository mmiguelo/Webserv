name: T2.1 - Full Client Lifecycle & Non-blocking I/O

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]\.[0-9]*"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=2
          TASK=1

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -eq "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_2-1_Lifecycle_Tests:
    name: Task 2.1 Lifecycle Tests
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ strace netcat-openbsd curl procps

      - uses: actions/checkout@v4

      #────── BUILD
      - name: Compile with strict flags
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      #──── Create large static file for partial-send test

      - name: Prepare test fixtures
        run: |
          DOCROOT="www"
          mkdir -p "$DOCROOT"
          dd if=/dev/urandom of="$DOCROOT/large.bin" bs=1024 count=2048 2>/dev/null
          EXPECTED=$(wc -c < "$DOCROOT/large.bin")
          echo "Created large.bin with $EXPECTED bytes"
          if [ ! -f "$DOCROOT/index.html" ]; then
            echo "<html><body>OK</body></html>" > "$DOCROOT/index.html"
          fi
      
      - name: Start server
        run: |
          ./webserv config/default.conf &
          echo $! > /tmp/webserv.pid
          sleep 1
          PID=$(cat /tmp/webserv.pid)
          kill -0 $PID && echo "Server running (PID $PID)"
      
      - name: Test 1: 100 concurrent connections
        run: |
          mkdir -p /tmp/curl_out
          for i in $(seq 1 100); do
            curl -s -o /tmp/curl_out/resp_$i -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 \
              http://localhost:8080/ > /tmp/curl_out/code_$i 2>/dev/null &
          done
          wait

          SUCCESS=0
          FAIL=0
          for i in $(seq 1 100); do
            CODE=$(cat /tmp/curl_out/code_$i 2>/dev/null || echo "000")
            if [ "$CODE" -ge 100 ] 2>/dev/null && [ "$CODE" -lt 600 ] 2>/dev/null; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done

          echo "SUCCESS: $SUCCESS / 100   FAIL: $FAIL"
          rm -rf /tmp/curl_out

          if [ "$SUCCESS" -lt 100 ]; then
            echo "FAIL: only $SUCCESS out of 100 requests received a valid HTTP response"
            exit 1
          fi
          echo "PASS: all 100 concurrent connections received responses"
