# yaml
name: T4.1 - Keep-Alive & Pipelining Integration Tests

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]+\.[0-9]+"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=4
          TASK=1

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -ge "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_4-1_KeepAlive_Pipelining_Tests:
    name: Task 4.1 Keep-Alive & Pipelining Tests
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ curl netcat-openbsd procps iproute2 socat

      - uses: actions/checkout@v4

      # BUILD
      - name: Compile
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      # PREPARE FIXTURES
      - name: Prepare test fixtures
        run: |
          mkdir -p config www/keep
          echo '<!DOCTYPE html><html><body>Home</body></html>' > www/index.html
          echo '<!DOCTYPE html><html><body>One</body></html>' > www/one.html
          echo '<!DOCTYPE html><html><body>Two</body></html>' > www/two.html

      - name: Write config for keep-alive tests
        run: |
          cat > config/keep.conf << 'EOF'
          server {
              listen 127.0.0.1:8080;
              root www;
              location / {
                  index index.html;
              }
          }
          EOF

      - name: Start server
        run: |
          ./webserv config/keep.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          for i in $(seq 1 30); do
            C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 1 http://127.0.0.1:8080/ || true)
            [ "$C" != "000" ] && break
            sleep 0.2
          done

      # TEST 1: Two pipelined GETs on one TCP connection via socat/netcat
      - name: "Test 1: Two pipelined GETs on one TCP connection"
        run: |
          printf 'GET /one.html HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\nGET /two.html HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\n' > /tmp/pipe.req
          # Use socat to open a TCP connection and send both requests in one stream
          socat - TCP:127.0.0.1:8080 < /tmp/pipe.req > /tmp/pipe.resp &
          S=$(jobs -p | tail -n1)
          sleep 1
          kill $S || true
          # Count occurrences of the body markers to ensure both responses present
          grep -q "One" /tmp/pipe.resp || (echo "FAIL: First response body missing"; sed -n '1,200p' /tmp/pipe.resp; exit 1)
          grep -q "Two" /tmp/pipe.resp || (echo "FAIL: Second response body missing"; sed -n '1,200p' /tmp/pipe.resp; exit 1)

      # TEST 2: curl --http1.1 -v shows Connection: keep-alive
      - name: "Test 2: curl --http1.1 -v returns Connection: keep-alive"
        run: |
          curl -s --http1.1 -v http://127.0.0.1:8080/ 2> /tmp/curlv.txt || true
          grep -i "Connection: *keep-alive" /tmp/curlv.txt || (echo "FAIL: Connection: keep-alive not found"; sed -n '1,200p' /tmp/curlv.txt; exit 1)

      # TEST 3: Client sends Connection: close header -> server closes client connection after response
      - name: "Test 3: Connection: close from client causes server to close client connection" 
        run: |
          printf 'GET / HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' > /tmp/close.req
          # Use netcat with timeout to read response; connection should close by server
          nc 127.0.0.1 8080 < /tmp/close.req > /tmp/close.resp || true
          # Ensure response body present and no further data after close
          grep -q "Home" /tmp/close.resp || (echo "FAIL: Response body missing"; sed -n '1,200p' /tmp/close.resp; exit 1)

      # TEST 4: Idle keep-alive past timeout -> server closes cleanly
      - name: "Test 4: Idle keep-alive past timeout closes connection"
        run: |
          # Open a persistent connection using socat and keep it open, then sleep longer than server timeout
          # We cannot change server timeout here; assume default is reasonable (e.g., 5s). Use a short probe.
          printf 'GET / HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\n' > /tmp/idle.req
          socat - TCP:127.0.0.1:8080 < /tmp/idle.req > /tmp/idle.resp &
          PID_SOCAT=$!
          sleep 1
          # Send no more data, wait to see if server closes the connection (socat will exit)
          sleep 6
          if kill -0 $PID_SOCAT 2>/dev/null; then
            # still running -> try to kill and fail
            kill $PID_SOCAT 2>/dev/null || true
            echo "FAIL: Connection still open after idle timeout"; exit 1
          else
            # socat exited -> connection closed by server
            grep -q "Home" /tmp/idle.resp || (echo "FAIL: Response body missing on idle test"; sed -n '1,200p' /tmp/idle.resp; exit 1)
          fi

      # TEARDOWN
      - name: Teardown
        if: always()
        run: |
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill $PID 2>/dev/null || true
          sleep 1
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill -9 $PID 2>/dev/null || true
          rm -f /tmp/webserv.pid /tmp/webserv.log || true
